<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santy's Pizzería</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4e6d8;
padding-bottom:220px;
}

header{
background:#b22222;
color:white;
text-align:center;
padding:30px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.menu-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:16px;
}

.card h3{
margin:0;
font-size:20px;
}

.price{
margin:10px 0;
font-weight:bold;
font-size:16px;
}

button{
background:#ff7a00;
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
cursor:pointer;
margin:4px;
font-weight:bold;
}

button:hover{
background:#e56700;
}

.cart{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#1f1f1f;
color:white;
padding:16px;
box-shadow:0 -6px 20px rgba(0,0,0,0.4);
}

.cart-items{
max-height:140px;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin:6px 0;
background:#2c2c2c;
padding:8px;
border-radius:8px;
}

.remove{
background:#ff3b30;
border:none;
border-radius:50%;
width:26px;
height:26px;
color:white;
font-weight:bold;
cursor:pointer;
}

.total{
font-size:18px;
margin-top:6px;
}

.whatsapp-btn{
background:#25D366;
width:100%;
padding:12px;
border:none;
border-radius:10px;
color:white;
font-size:16px;
margin-top:10px;
}

.pay-btn{
background:#009ee3;
width:100%;
padding:12px;
border:none;
border-radius:10px;
color:white;
font-size:16px;
margin-top:8px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.added{
animation:addAnim .3s;
}

@keyframes addAnim{

0%{transform:scale(.8)}
100%{transform:scale(1)}

}

</style>

</head>

<body>

<header>

<h1>🍕 Santy's Pizzería</h1>
<p>Hecha a mano · Calidad superior</p>

</header>

<div class="container">

<h2>Datos del cliente</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<h2>🍕 Pizzas</h2>

<div class="menu-grid">

<div class="card">
<img src="img_1633.jpg">
<div class="card-body">
<h3>Mexicana</h3>
<div class="price">$189 | $209 | $239</div>
<button onclick="add('Mexicana 35cm',189)">35cm</button>
<button onclick="add('Mexicana 40cm',209)">40cm</button>
<button onclick="add('Mexicana 45cm',239)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1632.jpg">
<div class="card-body">
<h3>Pepperoni</h3>
<div class="price">$179 | $199 | $229</div>
<button onclick="add('Pepperoni 35cm',179)">35cm</button>
<button onclick="add('Pepperoni 40cm',199)">40cm</button>
<button onclick="add('Pepperoni 45cm',229)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1631.jpg">
<div class="card-body">
<h3>Hawaiana</h3>
<div class="price">$189 | $209 | $239</div>
<button onclick="add('Hawaiana 35cm',189)">35cm</button>
<button onclick="add('Hawaiana 40cm',209)">40cm</button>
<button onclick="add('Hawaiana 45cm',239)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1630.jpg">
<div class="card-body">
<h3>3 Carnes</h3>
<div class="price">$199 | $219 | $249</div>
<button onclick="add('3 Carnes 35cm',199)">35cm</button>
<button onclick="add('3 Carnes 40cm',219)">40cm</button>
<button onclick="add('3 Carnes 45cm',249)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1629.jpg">
<div class="card-body">
<h3>Jamón</h3>
<div class="price">$179 | $199 | $229</div>
<button onclick="add('Jamón 35cm',179)">35cm</button>
<button onclick="add('Jamón 40cm',199)">40cm</button>
<button onclick="add('Jamón 45cm',229)">45cm</button>
</div>
</div>

</div>

</div>

<div class="cart">

<div class="cart-items" id="cartItems"></div>

<div class="total" id="total">Total $0</div>

<button class="whatsapp-btn" onclick="pedido()">
Enviar pedido por WhatsApp
</button>

<button class="pay-btn" onclick="pagar()">
Pagar con tarjeta
</button>

<button class="pay-btn" onclick="confirmarPago()">
Confirmar pago realizado
</button>

</div>

<script>

let cart=[]
let total=0

let codigo="SP-"+Math.floor(1000+Math.random()*9000)

function add(producto,precio){

cart.push({producto,precio})
total+=precio

renderCart()

}

function removeItem(index){

total-=cart[index].precio
cart.splice(index,1)

renderCart()

}

function renderCart(){

let html=""

cart.forEach((item,index)=>{

html+=`
<div class="cart-item">

<div>
<b>${item.producto}</b><br>
$${item.precio}
</div>

<button class="remove" onclick="removeItem(${index})">
×
</button>

</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerHTML="Total $"+total

}

function pedido(){

let mensaje="Pedido Santy's Pizzería%0A"

mensaje+="Código: "+codigo+"%0A%0A"

cart.forEach(item=>{
mensaje+=item.producto+" - $"+item.precio+"%0A"
})

mensaje+="%0ATotal: $"+total

window.open("https://wa.me/526693123366?text="+mensaje)

}

function pagar(){
    
    function confirmarPago(){

if(cart.length==0){

alert("No hay productos en el carrito")
return

}

let nombre=document.getElementById("nombre").value
let telefono=document.getElementById("telefono").value
let direccion=document.getElementById("direccion").value

if(nombre==""||telefono==""||direccion==""){

alert("Completa los datos del cliente")
return

}

let mensaje="PEDIDO PAGADO Santy's Pizzería%0A"

mensaje+="Código: "+codigo+"%0A%0A"

mensaje+="Cliente: "+nombre+"%0A"
mensaje+="Teléfono: "+telefono+"%0A"
mensaje+="Dirección: "+direccion+"%0A%0A"

cart.forEach(item=>{
mensaje+=item.producto+" - $"+item.precio+"%0A"
})

mensaje+="%0ATotal pagado: $"+total

window.open("https://wa.me/526693123366?text="+mensaje)

}

if(cart.length==0){

alert("Agrega productos al carrito")
return

}

let mensaje="Código de pedido: "+codigo+

"\n\nCopia este código en tu referencia de pago."+ 

"\n\nTotal a pagar: $"+total

alert(mensaje)

window.open("https://link.mercadopago.com.mx/santyspizzeria")

}

</script>

</body>
</html>
