<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santy's Pizzería</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4e6d8;
padding-bottom:120px;
}

header{
background:#b22222;
color:white;
text-align:center;
padding:30px;
}

.promo{
background:#ff7a00;
color:white;
text-align:center;
padding:20px;
font-size:20px;
font-weight:bold;
margin:20px;
border-radius:12px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.menu-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:14px;
}

button{
background:#ff7a00;
border:none;
padding:8px 12px;
border-radius:10px;
color:white;
cursor:pointer;
margin:4px;
font-size:14px;
}

input,select{
width:100%;
padding:9px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

.cart-toggle{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff7a00;
color:white;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
display:none;
}

.cart{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:520px;
background:#1f1f1f;
color:white;
padding:10px;
border-radius:14px;
display:none;
}

.cart-items{
max-height:70px;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
background:#2c2c2c;
padding:6px;
border-radius:8px;
margin:4px 0;
font-size:13px;
}

.remove{
background:#ff3b30;
border:none;
border-radius:50%;
width:20px;
height:20px;
color:white;
cursor:pointer;
}

.whatsapp-btn{
background:#25D366;
width:100%;
padding:8px;
border:none;
border-radius:10px;
margin-top:6px;
}

.pay-btn{
background:#009ee3;
width:100%;
padding:8px;
border:none;
border-radius:10px;
margin-top:6px;
}

</style>

</head>

<body>

<header>

<h1>🍕 Santy's Pizzería</h1>
<p>Hecha a mano · Calidad superior</p>

</header>

<div class="promo">

🔥 PROMOCIÓN MOSTRADOR 🔥  
Pizza grande $159  
Pepperoni o Jamón  

<p>Solo recogiendo en tienda</p>

</div>

<div class="container">

<h2>Tipo de pedido</h2>

<select id="tipoPedido" onchange="cambiarTipoPedido()">

<option value="domicilio">Entrega a domicilio</option>
<option value="tienda">Recoger en tienda</option>

</select>

<h2>Datos del cliente</h2>

<input id="nombre" placeholder="Nombre">

<input id="telefono" placeholder="Teléfono">

<div id="direccionCampos">

<input id="direccion" placeholder="Dirección">
<input id="calles" placeholder="Entre qué calles">
<input id="referencia" placeholder="Referencia">

</div>

<h2>🍕 Pizzas</h2>

<div class="menu-grid">

<div class="card">
<img src="img_1633.JPG">
<div class="card-body">
<h3>Mexicana</h3>
<button onclick="add('Mexicana 35cm',189)">35cm</button>
<button onclick="add('Mexicana 40cm',209)">40cm</button>
<button onclick="add('Mexicana 45cm',239)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1632.JPG">
<div class="card-body">
<h3>Pepperoni</h3>
<button onclick="add('Pepperoni 35cm',179)">35cm</button>
<button onclick="add('Pepperoni 40cm',199)">40cm</button>
<button onclick="add('Pepperoni 45cm',229)">45cm</button>
</div>
</div>

</div>

<h2>🍗 Alitas</h2>

<select id="salsa">

<option value="BBQ">BBQ</option>
<option value="BBQ Picante">BBQ Picante</option>
<option value="Búfalo">Búfalo</option>
<option value="Red Hot">Red Hot</option>
<option value="Mango Habanero">Mango Habanero</option>

</select>

<button onclick="agregarAlitas(6,99)">6 piezas $99</button>
<button onclick="agregarAlitas(10,149)">10 piezas $149</button>

<h2>🥔 Papas Gajo</h2>

<button onclick="add('Papas gajo 220g',79)">220g $79</button>
<button onclick="add('Papas gajo 400g',99)">400g $99</button>

</div>

<div class="cart-toggle" id="cartToggle" onclick="toggleCart()">
🛒 Ver carrito (0)
</div>

<div class="cart" id="cart">

<div class="cart-items" id="cartItems"></div>

<div id="contadorCarrito"></div>

<div id="total">Total $0</div>

<button class="whatsapp-btn" onclick="pedido()">
Enviar pedido por WhatsApp
</button>

<button class="pay-btn" onclick="pagar()">
Pagar con tarjeta
</button>

<button class="pay-btn" onclick="confirmarPago()">
Confirmar pago realizado
</button>

</div>

<script>

let cart=[]
let total=0
let codigo="SP-"+Math.floor(1000+Math.random()*9000)

function cambiarTipoPedido(){

let tipo=document.getElementById("tipoPedido").value

let campos=document.getElementById("direccionCampos")

if(tipo=="tienda"){
campos.style.display="none"
}else{
campos.style.display="block"
}

}

function validarDatos(){

let tipo=document.getElementById("tipoPedido").value
let nombre=document.getElementById("nombre").value
let telefono=document.getElementById("telefono").value
let direccion=document.getElementById("direccion").value
let calles=document.getElementById("calles").value
let referencia=document.getElementById("referencia").value

if(nombre=="" || telefono==""){
alert("Completa nombre y teléfono")
return false
}

if(tipo=="domicilio"){

if(direccion=="" || calles=="" || referencia==""){

alert("Completa todos los datos de domicilio")
return false

}

}

return true

}

function add(producto,precio){

cart.push({producto,precio})
total+=precio
renderCart()

}

function agregarAlitas(cantidad,precio){

let salsa=document.getElementById("salsa").value

let producto="Alitas "+cantidad+" piezas - Salsa "+salsa

cart.push({producto,precio})

total+=precio

renderCart()

}

function removeItem(index){

total-=cart[index].precio

cart.splice(index,1)

renderCart()

}

function renderCart(){

let html=""

cart.forEach((item,index)=>{

html+=`

<div class="cart-item">

<div>

<b>${item.producto}</b><br>

$${item.precio}

</div>

<button class="remove" onclick="removeItem(${index})">×</button>

</div>

`

})

document.getElementById("cartItems").innerHTML=html

document.getElementById("total").innerHTML="Total $"+total

document.getElementById("contadorCarrito").innerHTML="Productos en carrito: "+cart.length

let boton=document.getElementById("cartToggle")

if(cart.length>0){

boton.style.display="block"

boton.innerHTML="🛒 Ver carrito ("+cart.length+")"

}

}

function toggleCart(){

let cartBox=document.getElementById("cart")

if(cartBox.style.display=="block"){

cartBox.style.display="none"

}else{

cartBox.style.display="block"

}

}

function pedido(){

if(!validarDatos()) return

let mensaje="Pedido Santy's Pizzería%0A"

mensaje+="Código: "+codigo+"%0A%0A"

let nombre=document.getElementById("nombre").value
let telefono=document.getElementById("telefono").value

mensaje+="Cliente: "+nombre+"%0A"
mensaje+="Teléfono: "+telefono+"%0A"

if(document.getElementById("tipoPedido").value=="domicilio"){

mensaje+="Dirección: "+document.getElementById("direccion").value+"%0A"
mensaje+="Entre calles: "+document.getElementById("calles").value+"%0A"
mensaje+="Referencia: "+document.getElementById("referencia").value+"%0A"

}

mensaje+="%0A"

cart.forEach(item=>{
mensaje+=item.producto+" - $"+item.precio+"%0A"
})

mensaje+="%0ATotal: $"+total

window.open("https://wa.me/526693123366?text="+mensaje)

}

function pagar(){

if(!validarDatos()) return

alert("Código de pedido: "+codigo+"\n\nCopia este código en tu referencia de pago.\n\nTotal $"+total)

window.open("https://link.mercadopago.com.mx/santyspizzeria")

}

function confirmarPago(){

if(!validarDatos()) return

let mensaje="PEDIDO PAGADO%0A"

mensaje+="Código: "+codigo+"%0A"

window.open("https://wa.me/526693123366?text="+mensaje)

}

</script>

</body>
</html>
