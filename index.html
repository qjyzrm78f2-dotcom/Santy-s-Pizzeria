<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santy's Pizzería</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4e6d8;
padding-bottom:320px;
}

header{
text-align:center;
}

.banner{
width:100%;
height:240px;
object-fit:cover;
}

/* MENU SUPERIOR */

.menu-nav{
display:flex;
gap:10px;
overflow-x:auto;
padding:12px;
background:white;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
justify-content:center;
}

.menu-nav button{
background:#ff7a00;
border:none;
color:white;
padding:10px 18px;
border-radius:25px;
font-weight:bold;
}

/* CONTENEDOR */

.container{
max-width:700px;
margin:auto;
padding:20px;
}

/* PROMOS */

.promo{
padding:10px 0 25px 0;
}

.promos-slider{

display:flex;
gap:16px;

overflow-x:auto;
padding:0 16px;

scroll-snap-type:x mandatory;

}

.promos-slider::-webkit-scrollbar{
display:none;
}

/* TARJETA PROMO */

.promo-card{

flex:0 0 85%;

background:white;
border-radius:22px;
overflow:hidden;

box-shadow:0 14px 30px rgba(0,0,0,0.15);

scroll-snap-align:center;

}

.promo-card img{
width:100%;
height:200px;
object-fit:cover;
}

.promo-info{
padding:20px;
text-align:center;
font-weight:bold;
font-size:18px;
line-height:1.4;
}

.promo-label{

position:absolute;
margin:12px;

background:#ff7a00;
color:white;

padding:6px 12px;
border-radius:10px;

font-size:13px;
font-weight:bold;

}

.promo-label.green{
background:#27ae60;
}

.promo-label.red{
background:#e74c3c;
}

.promo-urgencia{
font-size:13px;
color:#ff7a00;
margin-top:6px;
}

/* TOAST */

#toast{

position:fixed;
bottom:160px;
left:50%;

transform:translateX(-50%);

background:#2ecc71;
color:white;

padding:12px 20px;
border-radius:25px;

font-weight:bold;

opacity:0;
transition:.4s;

z-index:1000;

}

#toast.show{
opacity:1;
transform:translateX(-50%) translateY(-10px);
}

</style>
</head>

<body>

<header>

<img src="logoo.png" class="banner">

<div class="menu-nav">

<button onclick="scrollToSection('promo')">Promos</button>
<button onclick="scrollToSection('pizzas')">Pizzas</button>
<button onclick="scrollToSection('alitas')">Alitas</button>
<button onclick="scrollToSection('papas')">Papas</button>

</div>

</header>


<!-- PROMOS -->

<div class="promo" id="promo">

<div class="promos-slider">

<div class="promo-card">

<div class="promo-label">💥 MOSTRADOR</div>

<img src="peperoni-jamon.png">

<div class="promo-info">
Pizza grande $159<br>
Pepperoni o Jamón
</div>

</div>


<div class="promo-card">

<div class="promo-label">🔥 PROMO DEL DÍA</div>

<img id="promoDiaImg" src="promo-lunes.png">

<div class="promo-info">

<div id="promoTitulo"></div>

<div id="promoTexto"></div>

<div class="promo-urgencia" id="promoHorario"></div>

</div>

</div>


<div class="promo-card">

<div class="promo-label green">💰 MEJOR PRECIO</div>

<img src="combo-familiar.png">

<div class="promo-info">
Combo Familiar<br>
Pizza 45cm + 10 alitas + papas
</div>

</div>


<div class="promo-card">

<div class="promo-label red">🔥 MÁS PEDIDO</div>

<img src="img_1631.png">

<div class="promo-info">
🍕 HAWAIANA
</div>

</div>

</div>

</div>

<div id="toast">✔ Producto agregado</div>

<script>

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

function promoDelDia(){

let ahora=new Date()
let hoy=ahora.getDay()
let hora=ahora.getHours()
let minuto=ahora.getMinutes()

let titulo=document.getElementById("promoTitulo")
let texto=document.getElementById("promoTexto")
let imagen=document.getElementById("promoDiaImg")
let horario=document.getElementById("promoHorario")

let inicio=10
let fin=16

if(hoy==1){
titulo.innerHTML="🔥 PROMO DEL LUNES"
texto.innerHTML="Pizza + Papas $199"
imagen.src="promo-lunes.png"
}

if(hoy==2){
titulo.innerHTML="🔥 PROMO DEL MARTES"
texto.innerHTML="Pizza + Alitas $219"
imagen.src="promo-martes.png"
}

if(hoy==3){
titulo.innerHTML="🔥 PROMO DEL MIÉRCOLES"
texto.innerHTML="Pizza + Papas + Refresco $239"
imagen.src="promo-miercoles.png"
}

if(hoy==4){
titulo.innerHTML="🔥 PROMO DEL JUEVES"
texto.innerHTML="Pizza 40cm $199"
imagen.src="promo-jueves.png"
}

if(hoy==5){
titulo.innerHTML="🔥 PROMO DEL VIERNES"
texto.innerHTML="2 Pizzas Grandes x $299"
imagen.src="promo-viernes.png"
}

if(hoy==6){
titulo.innerHTML="🔥 PROMO DEL SÁBADO"
texto.innerHTML="Pizza 40cm + 10 Alitas $349"
imagen.src="promo-sabado.png"
}

if(hoy==0){
titulo.innerHTML="🔥 PROMO DEL DOMINGO"
texto.innerHTML="Pizza 45cm + Alitas + Papas $399"
imagen.src="promo-domingo.png"
}

if(hora>=inicio && hora<fin){

let horasRestantes=fin-hora-1
let minutosRestantes=59-minuto

horario.innerHTML="🔥 Solo hoy • termina en "+horasRestantes+"h "+minutosRestantes+"m"

}else{

horario.innerHTML="⏰ Disponible de 10:00 AM a 4:00 PM"

}

}

promoDelDia()

</script>

</body>
</html>
