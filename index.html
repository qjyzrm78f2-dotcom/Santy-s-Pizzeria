<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santy's Pizzería</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4e6d8;
}

header{
background:#b22222;
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.menu-grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.card h3{
margin:0;
}

.price{
margin:8px 0;
font-weight:bold;
}

button{
background:#ff7a00;
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
margin:3px;
}

button:hover{
background:#e56700;
}

.cart{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#222;
color:white;
padding:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.remove{
background:red;
border:none;
border-radius:6px;
padding:4px 8px;
color:white;
cursor:pointer;
}

.whatsapp-btn{
background:#25D366;
width:100%;
padding:12px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
margin-top:10px;
}

.pay-btn{
background:#009ee3;
width:100%;
padding:12px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
margin-top:8px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<header>

<h1>🍕 Santy's Pizzería</h1>
<p>Hecha a mano · Calidad superior</p>

</header>

<div class="container">

<h2>Datos del cliente</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<h2>🍕 Pizzas</h2>

<div class="menu-grid">

<div class="card">
<img src="img_1633.jpg">
<div class="card-body">
<h3>Mexicana</h3>
<div class="price">$189 | $209 | $239</div>
<button onclick="add('Mexicana 35cm',189)">35cm</button>
<button onclick="add('Mexicana 40cm',209)">40cm</button>
<button onclick="add('Mexicana 45cm',239)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1632.jpg">
<div class="card-body">
<h3>Pepperoni</h3>
<div class="price">$179 | $199 | $229</div>
<button onclick="add('Pepperoni 35cm',179)">35cm</button>
<button onclick="add('Pepperoni 40cm',199)">40cm</button>
<button onclick="add('Pepperoni 45cm',229)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1631.jpg">
<div class="card-body">
<h3>Hawaiana</h3>
<div class="price">$189 | $209 | $239</div>
<button onclick="add('Hawaiana 35cm',189)">35cm</button>
<button onclick="add('Hawaiana 40cm',209)">40cm</button>
<button onclick="add('Hawaiana 45cm',239)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1630.jpg">
<div class="card-body">
<h3>3 Carnes</h3>
<div class="price">$199 | $219 | $249</div>
<button onclick="add('3 Carnes 35cm',199)">35cm</button>
<button onclick="add('3 Carnes 40cm',219)">40cm</button>
<button onclick="add('3 Carnes 45cm',249)">45cm</button>
</div>
</div>

<div class="card">
<img src="img_1629.jpg">
<div class="card-body">
<h3>Jamón</h3>
<div class="price">$179 | $199 | $229</div>
<button onclick="add('Jamón 35cm',179)">35cm</button>
<button onclick="add('Jamón 40cm',199)">40cm</button>
<button onclick="add('Jamón 45cm',229)">45cm</button>
</div>
</div>

</div>

</div>

<div class="cart">

<div id="cartItems"></div>

<div id="total">Total $0</div>

<button class="whatsapp-btn" onclick="pedido()">
Enviar pedido por WhatsApp
</button>

<button class="pay-btn" onclick="pagar()">
Pagar con tarjeta
</button>

</div>

<script>

let cart=[]
let total=0

function add(producto,precio){

cart.push({producto,precio})
total+=precio

renderCart()

}

function removeItem(index){

total-=cart[index].precio
cart.splice(index,1)

renderCart()

}

function renderCart(){

let html=""

cart.forEach((item,index)=>{

html+=`
<div class="cart-item">
${item.producto} $${item.precio}
<button class="remove" onclick="removeItem(${index})">X</button>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerHTML="Total $"+total

}

function pedido(){

let mensaje="Pedido Santy's Pizzería%0A%0A"

cart.forEach(item=>{
mensaje+=item.producto+" - $"+item.precio+"%0A"
})

mensaje+="%0ATotal: $"+total

window.open("https://wa.me/526693123366?text="+mensaje)

}

function pagar(){

window.open("https://link.mercadopago.com.mx/santyspizzeria")

}

</script>

</body>
</html>
