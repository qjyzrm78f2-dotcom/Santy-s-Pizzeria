<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santy's Pizzería</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4e6d8;
color:#222;
padding-bottom:300px;
}

header{
background:#b22222;
color:white;
text-align:center;
padding:30px 20px;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

button{
background:#ff7a00;
border:none;
padding:10px 14px;
border-radius:8px;
color:white;
cursor:pointer;
margin:4px;
}

button:hover{
background:#e56700;
}

.cart{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#222;
color:white;
padding:15px;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.remove{
background:red;
border:none;
border-radius:6px;
padding:4px 8px;
color:white;
cursor:pointer;
}

.whatsapp-btn{
background:#25D366;
width:100%;
padding:12px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:8px;
}

.pay-btn{
background:#009ee3;
width:100%;
padding:12px;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:8px;
}

input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<header>

<h1>🍕 SANTY'S PIZZERÍA</h1>
<p>Hecha a mano · Calidad superior</p>

</header>

<div class="container">

<h2>📦 Datos del cliente</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">
<input id="calles" placeholder="Entre qué calles">
<input id="referencia" placeholder="Referencia del domicilio">

<h2>🔥 PIZZAS</h2>

<div class="card">

<h3>Pepperoni</h3>

<button onclick="add('Pepperoni 35cm',179)">35cm $179</button>
<button onclick="add('Pepperoni 40cm',199)">40cm $199</button>
<button onclick="add('Pepperoni 45cm',229)">45cm $229</button>

</div>

<div class="card">

<h3>Jamón</h3>

<button onclick="add('Jamón 35cm',179)">35cm $179</button>
<button onclick="add('Jamón 40cm',199)">40cm $199</button>
<button onclick="add('Jamón 45cm',229)">45cm $229</button>

</div>

<div class="card">

<h3>Hawaiana</h3>

<button onclick="add('Hawaiana 35cm',189)">35cm $189</button>
<button onclick="add('Hawaiana 40cm',209)">40cm $209</button>
<button onclick="add('Hawaiana 45cm',239)">45cm $239</button>

</div>

<div class="card">

<h3>Mexicana</h3>

<button onclick="add('Mexicana 35cm',189)">35cm $189</button>
<button onclick="add('Mexicana 40cm',209)">40cm $209</button>
<button onclick="add('Mexicana 45cm',239)">45cm $239</button>

</div>

<div class="card">

<h3>3 Carnes</h3>

<button onclick="add('3 Carnes 35cm',199)">35cm $199</button>
<button onclick="add('3 Carnes 40cm',219)">40cm $219</button>
<button onclick="add('3 Carnes 45cm',249)">45cm $249</button>

</div>

<h2>🍗 ALITAS</h2>

<button onclick="add('Alitas 6 piezas',99)">6 piezas $99</button>
<button onclick="add('Alitas 10 piezas',149)">10 piezas $149</button>

<h2>🥔 PAPAS GAJO</h2>

<button onclick="add('Papas gajo 220g',79)">220g $79</button>
<button onclick="add('Papas gajo 400g',99)">400g $99</button>

<h2>🥤 REFRESCOS</h2>

<button onclick="add('Refresco 400ml',20)">400ml $20</button>
<button onclick="add('Refresco 600ml',28)">600ml $28</button>
<button onclick="add('Refresco 2L',45)">2L $45</button>

</div>

<div class="cart">

<div id="cartItems"></div>

<div id="total">Total $0</div>

<button class="whatsapp-btn" onclick="pedido()">
Enviar pedido por WhatsApp
</button>

<button class="pay-btn" onclick="pagar()">
Pagar con tarjeta
</button>

</div>

<script>

let cart=[]
let total=0

function add(producto,precio){

cart.push({producto,precio})
total+=precio

renderCart()

}

function removeItem(index){

total-=cart[index].precio
cart.splice(index,1)

renderCart()

}

function renderCart(){

let html=""

cart.forEach((item,index)=>{

html+=`
<div class="cart-item">
${item.producto} $${item.precio}
<button class="remove" onclick="removeItem(${index})">X</button>
</div>
`

})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerHTML="Total $"+total

}

function validar(){

let nombre=document.getElementById("nombre").value
let telefono=document.getElementById("telefono").value
let direccion=document.getElementById("direccion").value

if(nombre==""||telefono==""||direccion==""){

alert("Completa los datos del cliente")
return false

}

if(cart.length==0){

alert("Agrega productos al carrito")
return false

}

return true

}

function pedido(){

if(!validar()) return

let nombre=document.getElementById("nombre").value
let telefono=document.getElementById("telefono").value
let direccion=document.getElementById("direccion").value

let mensaje="Pedido Santy's Pizzería%0A%0A"

mensaje+="Cliente: "+nombre+"%0A"
mensaje+="Teléfono: "+telefono+"%0A"
mensaje+="Dirección: "+direccion+"%0A%0A"

cart.forEach(item=>{
mensaje+=item.producto+" - $"+item.precio+"%0A"
})

mensaje+="%0ATotal: $"+total

window.open("https://wa.me/526693123366?text="+mensaje)

}

function pagar(){

if(!validar()) return

window.open("https://link.mercadopago.com.mx/santyspizzeria")

}

</script>

</body>
</html>
