<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santy's Pizzería</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4e6d8;
padding-bottom:320px;
}

header{
text-align:center;
}

.banner{
width:100%;
height:240px;
object-fit:cover;
}

.menu-nav{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:white;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.menu-nav button{
background:#ff7a00;
border:none;
color:white;
padding:8px 14px;
border-radius:20px;
font-weight:bold;
white-space:nowrap;
}

.container{
max-width:700px;
margin:auto;
padding:20px;
}

.menu-grid{
display:grid;
gap:20px;
}

.card{
background:white;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
margin:10px 0;
font-weight:bold;
}

button{
background:#ff7a00;
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
font-weight:bold;
margin:4px;
}

.promo{
padding:10px 20px 30px 20px;
margin:0;
}

.promos-slider{
display:flex;
gap:18px;
overflow-x:auto;
padding:10px 20px;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

.promos-slider::-webkit-scrollbar{
display:none;
}

.promo-card{
position:relative;
min-width:280px;
background:white;
border-radius:22px;
overflow:hidden;
box-shadow:0 14px 30px rgba(0,0,0,0.18);
scroll-snap-align:center;
}

.promo-card img{
width:100%;
height:200px;
object-fit:cover;
}

.promo-info{
padding:20px;
font-weight:bold;
text-align:center;
font-size:18px;
line-height:1.5;
}

.promo-label{
position:absolute;
top:10px;
left:10px;
background:#ff7a00;
color:white;
padding:6px 12px;
border-radius:8px;
font-size:13px;
font-weight:bold;
}

.promo-label.green{background:#27ae60;}
.promo-label.red{background:#e74c3c;}

.promo-urgencia{
font-size:13px;
color:#ff7a00;
margin-top:8px;
font-weight:bold;
}

.cart-toggle{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#ff7a00;
color:white;
padding:12px 22px;
border-radius:30px;
font-weight:bold;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
display:none;
z-index:999;
}

.cart{
position:fixed;
bottom:80px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:420px;
background:#1f1f1f;
color:white;
padding:12px;
border-radius:16px;
display:none;
}

.cart-items{
max-height:90px;
overflow:auto;
}

.cart-item{
display:flex;
justify-content:space-between;
margin:6px 0;
background:#2c2c2c;
padding:6px;
border-radius:8px;
}

.remove{
background:#ff3b30;
border:none;
border-radius:50%;
width:22px;
height:22px;
color:white;
}

.total{
font-size:16px;
margin-top:6px;
}

.whatsapp-btn{
background:#25D366;
width:100%;
padding:10px;
border:none;
border-radius:10px;
color:white;
margin-top:8px;
}

.pay-btn{
background:#009ee3;
width:100%;
padding:10px;
border:none;
border-radius:10px;
color:white;
margin-top:6px;
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ccc;
}

#toast{
position:fixed;
bottom:160px;
left:50%;
transform:translateX(-50%);
background:#2ecc71;
color:white;
padding:12px 20px;
border-radius:25px;
font-weight:bold;
opacity:0;
transition:.4s;
z-index:1000;
}

#toast.show{
opacity:1;
transform:translateX(-50%) translateY(-10px);
}

</style>
</head>

<body>

<header>

<img src="logoo.png" class="banner">

<div class="menu-nav">
<button onclick="scrollToSection('promo')">Promos</button>
<button onclick="scrollToSection('pizzas')">Pizzas</button>
<button onclick="scrollToSection('alitas')">Alitas</button>
<button onclick="scrollToSection('papas')">Papas</button>
</div>

</header>

<div class="promo" id="promo">

<div class="promos-slider">

<div class="promo-card">
<div class="promo-label">💥 MOSTRADOR</div>
<img src="peperoni-jamon.png">
<div class="promo-info">
Pizza grande $159<br>
Pepperoni o Jamón
</div>
</div>

<div class="promo-card">
<div class="promo-label">🔥 PROMO DEL DÍA</div>
<img id="promoDiaImg" src="promo-lunes.png">
<div class="promo-info">
<div id="promoTitulo"></div>
<div id="promoTexto"></div>
<div class="promo-urgencia" id="promoHorario"></div>
</div>
</div>

<div class="promo-card">
<div class="promo-label green">💰 MEJOR PRECIO</div>
<img src="combo-familiar.png">
<div class="promo-info">
Combo Familiar<br>
Pizza 45cm + 10 alitas + papas
</div>
</div>

<div class="promo-card">
<div class="promo-label red">🔥 MÁS PEDIDO</div>
<img src="img_1631.png">
<div class="promo-info">
🍕 HAWAIANA
</div>
</div>

</div>
</div>

<div id="toast">✔ Producto agregado</div>

<script>

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"})
}

function promoDelDia(){

let ahora=new Date()
let hoy=ahora.getDay()
let hora=ahora.getHours()
let minuto=ahora.getMinutes()

let titulo=document.getElementById("promoTitulo")
let texto=document.getElementById("promoTexto")
let imagen=document.getElementById("promoDiaImg")
let horario=document.getElementById("promoHorario")

let inicio=10
let fin=16

if(hoy==1){
titulo.innerHTML="🔥 PROMO DEL LUNES"
texto.innerHTML="Pizza + Papas $199"
imagen.src="promo-lunes.png"
}

if(hoy==2){
titulo.innerHTML="🔥 PROMO DEL MARTES"
texto.innerHTML="Pizza + Alitas $219"
imagen.src="promo-martes.png"
}

if(hoy==3){
titulo.innerHTML="🔥 PROMO DEL MIÉRCOLES"
texto.innerHTML="Pizza + Papas + Refresco $239"
imagen.src="promo-miercoles.png"
}

if(hoy==4){
titulo.innerHTML="🔥 PROMO DEL JUEVES"
texto.innerHTML="Pizza 40cm $199"
imagen.src="promo-jueves.png"
}

if(hoy==5){
titulo.innerHTML="🔥 PROMO DEL VIERNES"
texto.innerHTML="2 Pizzas Grandes x $299"
imagen.src="promo-viernes.png"
}

if(hoy==6){
titulo.innerHTML="🔥 PROMO DEL SÁBADO"
texto.innerHTML="Pizza 40cm + 10 Alitas $349"
imagen.src="promo-sabado.png"
}

if(hoy==0){
titulo.innerHTML="🔥 PROMO DEL DOMINGO"
texto.innerHTML="Pizza 45cm + Alitas + Papas $399"
imagen.src="promo-domingo.png"
}

if(hora>=inicio && hora<fin){

let horasRestantes=fin-hora-1
let minutosRestantes=59-minuto

horario.innerHTML="🔥 Solo hoy • termina en "+horasRestantes+"h "+minutosRestantes+"m"

}else{

horario.innerHTML="⏰ Disponible de 10:00 AM a 4:00 PM"

}

}

promoDelDia()

</script>

</body>
</html>
