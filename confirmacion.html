<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pago confirmado | Santy's Pizzería</title>

<style>

body{
font-family:Arial;
background:#f4e6d8;
margin:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:20px;
max-width:420px;
width:90%;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

h1{
margin-top:0;
}

button{
background:#25D366;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="box">

<h1>✅ Pago recibido</h1>

<p>Tu pago fue realizado correctamente.</p>

<p>Presiona el botón para enviar tu pedido a la pizzería.</p>

<button onclick="enviarPedido()">
Enviar pedido a Santy's Pizzería
</button>

</div>

<script>

function enviarPedido(){

let pedido = JSON.parse(localStorage.getItem("pedidoActual"))

if(!pedido){

alert("No se encontró ningún pedido")
return

}

let mensaje="🍕 PEDIDO PAGADO Santy's Pizzería %0A%0A"

mensaje+="Código: "+pedido.codigo+"%0A%0A"

pedido.productos.forEach(p=>{
mensaje+=p.producto+" - $"+p.precio+"%0A"
})

mensaje+="%0ATotal pagado: $"+pedido.total

window.open("https://wa.me/526693123366?text="+mensaje)

localStorage.removeItem("pedidoActual")

}

</script>

</body>

</html>
